<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GameSearch Engine</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
    }

    header {
      background: #1a1a2e;
      padding: 24px;
      text-align: center;
      border-bottom: 2px solid #6c63ff;
    }

    header h1 {
      font-size: 2rem;
      color: #6c63ff;
      letter-spacing: 2px;
    }

    header p {
      color: #888;
      margin-top: 4px;
      font-size: 0.9rem;
    }

    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 32px;
      background: #16213e;
      padding: 10px;
      font-size: 0.85rem;
      color: #aaa;
    }

    .stats-bar span b { color: #6c63ff; }

    .search-container {
      max-width: 700px;
      margin: 40px auto 0;
      padding: 0 16px;
      position: relative;
    }

    .search-box {
      display: flex;
      gap: 8px;
    }

    #query {
      flex: 1;
      padding: 14px 18px;
      border-radius: 8px;
      border: 2px solid #6c63ff;
      background: #1a1a2e;
      color: #fff;
      font-size: 1rem;
      outline: none;
    }

    #query:focus { border-color: #a89cff; }

    button {
      padding: 14px 24px;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #574fd6; }

    /* Autocomplete */
    #suggestions {
      position: absolute;
      top: 52px;
      left: 16px;
      right: 90px;
      background: #1a1a2e;
      border: 1px solid #6c63ff;
      border-radius: 0 0 8px 8px;
      z-index: 10;
      display: none;
    }

    .suggestion-item {
      padding: 10px 16px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .suggestion-item:hover { background: #6c63ff33; }

    /* Tabs */
    .tabs {
      max-width: 700px;
      margin: 20px auto 0;
      padding: 0 16px;
      display: flex;
      gap: 8px;
    }

    .tab {
      padding: 8px 18px;
      border-radius: 6px;
      background: #1a1a2e;
      color: #aaa;
      cursor: pointer;
      border: 1px solid #333;
      font-size: 0.85rem;
    }

    .tab.active { background: #6c63ff; color: #fff; border-color: #6c63ff; }

    /* Results */
    #results-container {
      max-width: 700px;
      margin: 16px auto 40px;
      padding: 0 16px;
    }

    #search-info {
      font-size: 0.82rem;
      color: #888;
      margin-bottom: 12px;
    }

    .result-card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      padding: 18px;
      margin-bottom: 14px;
      transition: border-color 0.2s;
    }

    .result-card:hover { border-color: #6c63ff; }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .result-title {
      font-size: 1.05rem;
      font-weight: bold;
      color: #a89cff;
    }

    .result-title a {
      color: inherit;
      text-decoration: none;
    }

    .result-title a:hover { text-decoration: underline; }

    /* Score badges */
    .score-badges { display: flex; gap: 8px; flex-shrink: 0; margin-left: 12px; }

    .badge {
      font-size: 0.72rem;
      padding: 3px 8px;
      border-radius: 12px;
      font-weight: bold;
      white-space: nowrap;
    }

    .badge-bm25 { background: #6c63ff33; color: #a89cff; border: 1px solid #6c63ff; }
    .badge-tfidf { background: #ff636333; color: #ff9c9c; border: 1px solid #ff6363; }

    .result-text {
      font-size: 0.88rem;
      color: #ccc;
      line-height: 1.6;
    }

    /* Term highlighting */
    mark {
      background: #6c63ff55;
      color: #fff;
      border-radius: 3px;
      padding: 0 2px;
    }

    /* Comparison view */
    .comparison-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .compare-col h3 {
      text-align: center;
      margin-bottom: 10px;
      font-size: 0.9rem;
      padding: 6px;
      border-radius: 6px;
    }

    .bm25-header { background: #6c63ff33; color: #a89cff; }
    .tfidf-header { background: #ff636333; color: #ff9c9c; }

    .compare-item {
      background: #16213e;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
      font-size: 0.82rem;
    }

    .compare-item .rank { color: #888; margin-right: 6px; }
    .compare-item .ctitle { color: #e0e0e0; font-weight: bold; }
    .compare-item .cscore { color: #aaa; font-size: 0.75rem; }

    #no-results {
      text-align: center;
      color: #666;
      margin-top: 40px;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>

<header>
  <h1>🎮 GameSearch</h1>
  <p>BM25-powered video game search engine</p>
</header>

<div class="stats-bar">
  <span>📄 Documents: <b>{{ stats.total_documents }}</b></span>
  <span>📚 Vocabulary: <b>{{ stats.vocabulary_size }}</b> terms</span>
  <span>📏 Avg length: <b>{{ stats.avg_doc_length }}</b> tokens</span>
</div>

<div class="search-container">
  <div class="search-box">
    <input type="text" id="query" placeholder="Search for a game, genre, mechanic..." autocomplete="off"/>
    <button onclick="doSearch()">Search</button>
  </div>
  <div id="suggestions"></div>
</div>

<div class="tabs">
  <div class="tab active" id="tab-results" onclick="switchTab('results')">Results</div>
  <div class="tab" id="tab-compare" onclick="switchTab('compare')">BM25 vs TF-IDF</div>
</div>

<div id="results-container">
  <div id="search-info"></div>
  <div id="results-view"></div>
  <div id="compare-view" style="display:none"></div>
  <div id="no-results"></div>
</div>

<script>
  let currentResults = [];
  let currentTerms = [];
  let activeTab = "results";
  let suggestTimer = null;

  // ── Búsqueda ────────────────────────────────────────────────────────────────
  async function doSearch() {
    const q = document.getElementById("query").value.trim();
    if (!q) return;
    hideSuggestions();

    document.getElementById("search-info").textContent = "Searching...";
    document.getElementById("results-view").innerHTML = "";
    document.getElementById("compare-view").innerHTML = "";
    document.getElementById("no-results").textContent = "";

    const res = await fetch(`/search?q=${encodeURIComponent(q)}`);
    const data = await res.json();

    currentResults = data.results;
    currentTerms = data.query_terms;

    document.getElementById("search-info").textContent =
      `${data.results.length} results in ${(data.time * 1000).toFixed(2)}ms — query terms: ${data.query_terms.join(", ")}`


    if (data.results.length === 0) {
      document.getElementById("no-results").textContent = "No results found. Try a different query.";
      return;
    }

    renderResults();
    renderComparison();
  }

  // ── Enter para buscar ────────────────────────────────────────────────────────
  document.getElementById("query").addEventListener("keydown", e => {
    if (e.key === "Enter") doSearch();
  });

  // ── Highlight ────────────────────────────────────────────────────────────────
  function highlight(text, terms) {
    if (!terms.length) return text;
    // Truncar texto a 300 chars para la preview
    let preview = text.length > 300 ? text.substring(0, 300) + "..." : text;
    terms.forEach(term => {
      const re = new RegExp(`(${term})`, "gi");
      preview = preview.replace(re, "<mark>$1</mark>");
    });
    return preview;
  }

  // ── Renderizar resultados ────────────────────────────────────────────────────
  function renderResults() {
    const container = document.getElementById("results-view");
    container.innerHTML = currentResults.map((r, i) => `
      <div class="result-card">
        <div class="result-header">
          <div class="result-title">
            <span style="color:#666;">#${i+1}</span>
            <a href="${r.source}" target="_blank"> ${r.title}</a>
          </div>
          <div class="score-badges">
            <span class="badge badge-bm25">BM25: ${r.bm25_score}</span>
            <span class="badge badge-tfidf">TF-IDF: ${r.tfidf_score}</span>
          </div>
        </div>
        <div class="result-text">${highlight(r.text, currentTerms)}</div>
      </div>
    `).join("");
  }

  // ── Comparación BM25 vs TF-IDF ───────────────────────────────────────────────
  function renderComparison() {
    const bm25 = [...currentResults].sort((a, b) => b.bm25_score - a.bm25_score);
    const tfidf = [...currentResults].sort((a, b) => b.tfidf_score - a.tfidf_score);

    const makeList = (items, scoreKey, cls) =>
      items.map((r, i) => `
        <div class="compare-item">
          <span class="rank">#${i+1}</span>
          <span class="ctitle">${r.title}</span><br/>
          <span class="cscore">${scoreKey}: ${r[scoreKey === 'BM25' ? 'bm25_score' : 'tfidf_score']}</span>
        </div>
      `).join("");

    document.getElementById("compare-view").innerHTML = `
      <div class="comparison-grid">
        <div class="compare-col">
          <h3 class="bm25-header">🟣 BM25 Ranking</h3>
          ${makeList(bm25, 'BM25', 'bm25')}
        </div>
        <div class="compare-col">
          <h3 class="tfidf-header">🔴 TF-IDF Ranking</h3>
          ${makeList(tfidf, 'TF-IDF', 'tfidf')}
        </div>
      </div>
    `;
  }

  // ── Tabs ─────────────────────────────────────────────────────────────────────
  function switchTab(tab) {
    activeTab = tab;
    document.getElementById("tab-results").classList.toggle("active", tab === "results");
    document.getElementById("tab-compare").classList.toggle("active", tab === "compare");
    document.getElementById("results-view").style.display = tab === "results" ? "block" : "none";
    document.getElementById("compare-view").style.display = tab === "compare" ? "block" : "none";
  }

  // ── Autocomplete ─────────────────────────────────────────────────────────────
  document.getElementById("query").addEventListener("input", e => {
    clearTimeout(suggestTimer);
    const val = e.target.value.trim();
    if (val.length < 2) { hideSuggestions(); return; }
    suggestTimer = setTimeout(() => fetchSuggestions(val), 200);
  });

  async function fetchSuggestions(prefix) {
    const res = await fetch(`/autocomplete?q=${encodeURIComponent(prefix)}`);
    const data = await res.json();
    showSuggestions(data.suggestions);
  }

  function showSuggestions(items) {
    const box = document.getElementById("suggestions");
    if (!items.length) { hideSuggestions(); return; }
    box.innerHTML = items.map(s =>
      `<div class="suggestion-item" onclick="selectSuggestion('${s}')">${s}</div>`
    ).join("");
    box.style.display = "block";
  }

  function hideSuggestions() {
    document.getElementById("suggestions").style.display = "none";
  }

  function selectSuggestion(word) {
    document.getElementById("query").value = word;
    hideSuggestions();
    doSearch();
  }

  document.addEventListener("click", e => {
    if (!e.target.closest(".search-container")) hideSuggestions();
  });
</script>

</body>
</html>
